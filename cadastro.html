<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Empresa | Digipoint</title>
  <link rel="stylesheet" href="cadastro-empresa.css">
</head>
<body>
  <div class="container">
    <main class="conteudo">
      <div class="card">
        <div class="cabecalho-card">
          <img src="logo_digipoint.png" alt="Logo Digipoint">
          <h2>Cadastro de Empresa</h2>
        </div>    
    <form >
      <label for="nome-empresa">Nome da Empresa</label>
      <input type="text" id="nome-empresa" name="nome-empresa" placeholder="Digite o nome da empresa" required>

      <label for="cnpj">CNPJ</label>
      <input type="text" id="cnpj" name="cnpj" placeholder="00.000.000/0001-00" required>

      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" placeholder="contato@empresa.com" required>

      <label for="telefone">Telefone</label>
      <input type="tel" id="telefone" name="telefone" placeholder="(00) 0000-0000">

      <label for="endereco">Endereço</label>
      <input type="text" id="endereco" name="endereco" placeholder="Rua, número, bairro" required>

      <label for="numero de colaboradores">Numero de colaboradores</label>
      <input type="text" id="numero de colaboradores" name="numero de colaboradores" placeholder="número" required>

      <button class="save-btn">Cadastrar Empresa</button>
    </form>
  </div>
</body>
</html>
